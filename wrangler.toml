name = "gamehub"
main = "worker/index.js"
compatibility_date = "2024-08-21"
compatibility_flags = ["nodejs_compat_v2", "nodejs_compat_populate_process_env"]

[vars]
DISABLE_DEV_BOTS = "true"
# Temporary: Mafia lobby test bots on production (host-only, lobby phase)
ALLOW_MAFIA_DEV_BOTS = "true"

[build]
command = "npm run build"

[[routes]]
pattern = "gamehub.mohamed-hussein.net"
custom_domain = true

# Static Next.js export — worker handles /socket.io and /health first
[assets]
directory = "frontend/out"
binding = "ASSETS"
not_found_handling = "single-page-application"
html_handling = "auto-trailing-slash"
run_worker_first = ["/socket.io/*", "/health"]

[durable_objects]
bindings = [
  { name = "engineActor", class_name = "EngineActor" },
  { name = "socketActor", class_name = "SocketActor" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["EngineActor", "SocketActor"]
