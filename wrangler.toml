name = "gamehub"
compatibility_date = "2024-01-01"

# Runs automatically before `wrangler deploy` (even if dashboard build step is empty)
[build]
command = "npm run build"

# Production custom domain
[[routes]]
pattern = "gamehub.mohamed-hussein.net"
custom_domain = true

# Static Next.js export output
[assets]
directory = "frontend/out"
not_found_handling = "single-page-application"
html_handling = "auto-trailing-slash"
