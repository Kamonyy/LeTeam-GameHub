# Deploy the game server to Render (WebSocket-capable).
# Cloudflare Pages hosts the frontend; this service hosts Socket.io.
#
# After deploy, set NEXT_PUBLIC_SERVER_URL on Cloudflare Pages to this service URL.

services:
  - type: web
    name: leteam-gamehub-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CLIENT_URL
        sync: false
